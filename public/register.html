<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Student CRUD</title>
    <link rel="stylesheet" href="./style.css/app.css">
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>Create a new account</h1>
            <div class="nav-links">
                <a href="/" class="nav-link secondary">Already have an account?</a>
            </div>
        </div>

        <div class="card form-card">
            <form action="/acc/register" method="POST" class="form-grid">
                <div>
                    <label for="name">Username</label>
                    <input type="text" id="name" name="name" placeholder="Your display name" required>
                </div>
                <div>
                    <label for="mail">Email address</label>
                    <input type="email" id="mail" name="mail" placeholder="name@example.com" required>
                </div>
                <div>
                    <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" placeholder="Choose a secure password" required>
                </div>
                <div class="actions">
                    <button type="submit" class="button primary">Register</button>
                    <a href="/" class="button secondary">Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
