<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student CRUD</title>
    <link rel="stylesheet" href="./style.css/app.css">
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>Welcome back</h1>
            <div class="nav-links">
                <a href="/register" class="nav-link secondary">Create account</a>
            </div>
        </div>

        <div class="card form-card">
            <form action="/acc/login" method="POST" class="form-grid">
                <div>
                    <label for="mail">Email address</label>
                    <input type="email" id="mail" name="mail" placeholder="name@example.com" required>
                </div>
                <div>
                    <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" placeholder="Enter your password" required>
                </div>
                <div class="actions">
                    <button type="submit" class="button primary">Login</button>
                    <a href="/register" class="button secondary">Register</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
